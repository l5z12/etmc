name: release

# Cut a release by pushing a tag (e.g. `v0.1.0`): build any missing natives at the release commit
# (reusing whatever's committed there), assemble the loader jars with them, and attach the jars to the
# GitHub Release. `workflow_dispatch` runs the same build WITHOUT publishing (a dry run).
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      easytier_ref:
        description: "EasyTier git ref to build any missing natives from"
        default: "main"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build only the natives missing at the release commit (committed ones are reused).
  natives:
    uses: ./.github/workflows/natives.yml
    with:
      easytier_ref: ${{ github.event.inputs.easytier_ref || 'main' }}

  # Assemble the loader jars; picks up the freshly-built native-* artifacts from the natives job above.
  jars:
    needs: natives
    uses: ./.github/workflows/build.yml

  publish:
    name: publish release
    needs: jars
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release and upload assets
    steps:
      - name: Download built jars
        uses: actions/download-artifact@v4
        with:
          name: etmc-jars
          path: jars

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: jars/**/*.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
