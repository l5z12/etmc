name: build

# Runs only on changes that actually need a build — docs/site-only commits are ignored. This builds
# the loader jars using the natives ALREADY COMMITTED in the repo; it never compiles natives itself
# (that's natives.yml, run on demand or by release.yml). So a routine push does no Rust work and shows
# a single "assemble jars" job — no skipped native matrix.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'site/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/workflows/release.yml'
      - '.github/workflows/natives.yml'
  pull_request:
    paths-ignore:
      - 'site/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/workflows/release.yml'
      - '.github/workflows/natives.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build every loader jar. Uses the committed natives, plus any freshly-built native-* artifacts that
  # exist in this run (release.yml builds those first and they're shared run-wide); a plain push has none.
  assemble:
    name: assemble jars
    runs-on: ubuntu-latest
    steps:
      - name: Checkout etmc
        uses: actions/checkout@v4

      - name: Download freshly-built natives (if any)
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: staging

      - name: Place natives
        run: |
          if [ -d staging ]; then
            for d in staging/native-*; do
              [ -e "$d" ] || continue
              tag="$(basename "$d" | sed 's/^native-//')"
              mkdir -p "common/src/main/resources/natives/$tag"
              cp "$d"/* "common/src/main/resources/natives/$tag/"
            done
          fi
          echo "Bundled natives:"
          find common/src/main/resources/natives -type f -printf '  %p (%s bytes)\n'

      # ForgeGradle's mavenizer needs a JDK 8; the build itself runs on 21.
      - name: Set up JDK 8 (Forge mavenizer)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build all platform jars
        run: |
          chmod +x ./gradlew
          # Point ForgeGradle's toolchain locator at the JDK 8 set up above (no GitHub auto-download).
          export JAVA_TOOL_OPTIONS="-Dorg.gradle.java.installations.paths=$JAVA_HOME_8_X64"
          ./gradlew build --no-daemon --stacktrace

      - name: Upload mod jars
        uses: actions/upload-artifact@v4
        with:
          name: etmc-jars
          path: |
            fabric/build/libs/*.jar
            paper/build/libs/*.jar
            neoforge/build/libs/*.jar
            forge/build/libs/*.jar
          if-no-files-found: error
