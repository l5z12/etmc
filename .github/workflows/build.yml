name: build

# Runs only on changes that actually need a build — docs/site-only commits are ignored. This builds
# the loader jars using the natives ALREADY COMMITTED in the repo; it never compiles natives itself
# (that's natives.yml, run on demand or by release.yml). So a routine push does no Rust work and shows
# a single "assemble jars" job — no skipped native matrix.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'site/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/workflows/release.yml'
      - '.github/workflows/natives.yml'
  pull_request:
    paths-ignore:
      - 'site/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/workflows/release.yml'
      - '.github/workflows/natives.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build every loader jar. Uses the committed natives, plus any freshly-built native-* artifacts that
  # exist in this run (release.yml builds those first and they're shared run-wide); a plain push has none.
  assemble:
    name: assemble jars
    runs-on: ubuntu-latest
    steps:
      - name: Checkout etmc
        uses: actions/checkout@v4

      - name: Download freshly-built natives (if any)
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: staging

      - name: Place natives
        run: |
          if [ -d staging ]; then
            for d in staging/native-*; do
              [ -e "$d" ] || continue
              tag="$(basename "$d" | sed 's/^native-//')"
              mkdir -p "common/src/main/resources/natives/$tag"
              cp "$d"/* "common/src/main/resources/natives/$tag/"
            done
          fi
          echo "Bundled natives:"
          find common/src/main/resources/natives -type f -printf '  %p (%s bytes)\n'

      # Fabric nodes need JDK 17 (1.17.1–1.20.1) and 21 (1.20.6+, loaders); ForgeGradle's mavenizer
      # needs JDK 8. setup-java exports JAVA_HOME_<ver>_X64 for each; we hand all three to Gradle's
      # toolchain locator so no JDK is auto-downloaded.
      - name: Set up JDK 8 (Forge mavenizer)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up JDK 17 (Fabric 1.17.1–1.20.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build every Fabric version node + all loader jars
        run: |
          chmod +x ./gradlew
          # Hand Gradle's toolchain locator every JDK we set up (no GitHub auto-download).
          export JAVA_TOOL_OPTIONS="-Dorg.gradle.java.installations.paths=$JAVA_HOME_8_X64,$JAVA_HOME_17_X64,$JAVA_HOME_21_X64"
          # chiseledBuild = every Stonecutter node: Fabric 1.17.1…1.21.10 + NeoForge 1.20.6/1.21.10
          # + Forge 1.21.10, all from the one shared src/ tree. Paper is built by the matrix job below.
          ./gradlew chiseledBuild --no-daemon --stacktrace

      - name: Upload mod jars
        uses: actions/upload-artifact@v4
        with:
          name: etmc-jars
          path: |
            versions/*/build/libs/*.jar
          if-no-files-found: error

  # Paper is server-side and uses only stable Bukkit API + version-independent common/, so one source
  # compiles across the whole range — only the paper-api version and the Java target change. Build each.
  paper:
    name: paper ${{ matrix.mc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { mc: '1.17.1',  java: '17' }
          - { mc: '1.18.2',  java: '17' }
          - { mc: '1.19.4',  java: '17' }
          - { mc: '1.20.1',  java: '17' }
          - { mc: '1.20.6',  java: '21' }
          - { mc: '1.21.10', java: '21' }
    steps:
      - name: Checkout etmc
        uses: actions/checkout@v4

      - name: Download freshly-built natives (if any)
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: staging

      - name: Place natives
        run: |
          if [ -d staging ]; then
            for d in staging/native-*; do
              [ -e "$d" ] || continue
              tag="$(basename "$d" | sed 's/^native-//')"
              mkdir -p "common/src/main/resources/natives/$tag"
              cp "$d"/* "common/src/main/resources/natives/$tag/"
            done
          fi

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build Paper jar (${{ matrix.mc }})
        run: |
          chmod +x ./gradlew
          ./gradlew :paper:build \
            -Ppaper_version=${{ matrix.mc }}-R0.1-SNAPSHOT \
            -Ppaper_java=${{ matrix.java }} \
            --no-daemon --stacktrace

      - name: Upload Paper jar
        uses: actions/upload-artifact@v4
        with:
          name: etmc-paper-${{ matrix.mc }}
          path: paper/build/libs/*.jar
          if-no-files-found: error
